<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Krisala Hiranandani Township</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-dark: #08080a;
            --gold-primary: #c5a059;
            --gold-light: #d4b877;
            --text-main: #f0ece2;
            --text-muted: #8a8a8e;
            --font-heading: 'Playfair Display', Georgia, serif;
            --font-body: 'Outfit', 'Segoe UI', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .offline-content {
            text-align: center;
            max-width: 500px;
            padding: 40px;
        }

        .offline-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .offline-content h1 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .offline-content h1 span {
            color: var(--gold-primary);
            font-style: italic;
        }

        .offline-content p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .retry-btn {
            display: inline-block;
            padding: 16px 40px;
            background: var(--gold-primary);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }

        .offline-note {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.6;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 0.8;
            }
        }

        .offline-icon {
            animation: pulse 2s ease infinite;
        }
    </style>
</head>

<body>
    <div class="offline-content">
        <div class="offline-icon">⚡</div>
        <h1>You're <span>offline</span></h1>
        <p>It appears you've lost your connection. The grandeur of Krisala Hiranandani Township awaits your return.</p>
        <button class="retry-btn" onclick="location.reload()">Try Again</button>
        <p class="offline-note">Previously visited pages may still be available from cache.</p>
    </div>
</body>

</html>
