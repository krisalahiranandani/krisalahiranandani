<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Masterplan | Krisala Hiranandani Township Hinjewadi</title>
    
    <!-- Phase 21: Extreme Performance Preloads (Lighthouse 100/100) -->
    <link rel="preload" href="style.css" as="style">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" as="style">

    <link rel="stylesheet" href="style.css">
    <script defer src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        .map-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            overflow: hidden;
            position: relative;
        }

        .map-wrapper {
            transition: transform 0.1s ease-out;
            transform-origin: center;
        }

        .map-img {
            max-width: none;
            height: auto;
            width: 3000px;
            /* High res width */
            user-select: none;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .control-btn:hover {
            color: var(--gold-primary);
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 100;
            background: rgba(197, 160, 89, 0.2);
            padding: 10px 20px;
            border-radius: 5px;
            color: #fff;
            text-decoration: none;
            backdrop-filter: blur(5px);
            border: 1px solid var(--gold-primary);
        }

        /* Overlays / Hotspots */
        .hotspot {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 2px dashed var(--gold-primary);
            border-radius: 50%;
            background: rgba(197, 160, 89, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            text-shadow: 0 0 10px #000;
            cursor: pointer;
            transition: all 0.3s;
        }

        .hotspot:hover {
            background: rgba(197, 160, 89, 0.4);
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-btn"><i class="ph ph-arrow-left"></i> Back to Site</a>

    <div class="map-container" id="mapContainer">
        <div class="map-wrapper" id="mapWrapper">
            <img fetchpriority="high" src="public/everlyn/page3_img1.png" alt="Masterplan" class="map-img" draggable="false">

            <!-- Approximate Hotspots -->
            <div class="hotspot" style="top: 25%; left: 35%;" onclick="window.location.href='everlyn.html'">
                Everlyn Tower
            </div>
            <div class="hotspot" style="top: 15%; left: 60%;" onclick="window.location.href='della.html'">
                The Della Collection
            </div>
            <div class="hotspot" style="top: 55%; left: 45%;" onclick="window.location.href='index.html#equestrian'">
                Private Racecourse
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="zoom(0.1)"><i class="ph ph-plus"></i></button>
        <button class="control-btn" onclick="zoom(-0.1)"><i class="ph ph-minus"></i></button>
        <button class="control-btn" onclick="resetZoom()"><i class="ph ph-arrows-out"></i></button>
    </div>

    <script>
        const wrapper = document.getElementById('mapWrapper');
        const container = document.getElementById('mapContainer');
        let scale = 1;
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;

        function updateTransform() {
            wrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        }

        function zoom(delta) {
            scale = Math.min(Math.max(0.5, scale + delta), 3);
            updateTransform();
        }

        function resetZoom() {
            scale = 1; translateX = 0; translateY = 0;
            updateTransform();
        }

        // Panning Logic
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            container.style.cursor = 'grabbing';
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        // Scroll Zoom
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            zoom(delta);
        }, { passive: false });
    </script>
</body>

</html>
